  mosaic: 0.0
  close_mosaic: 0
  mixup: 0.0
  cutmix: 0.0
  copy_paste: 0.0
  erasing: 0.0
  auto_augment: null

  # Pseudo labels are noisier than manual labels; keep pose priority but avoid overly aggressive box updates.
  pose: 24.0
  kobj: 1.5
  box: 4.0
  cls: 0.2
  dfl: 1.0

containment_loss:
  margin: 0.0
  normalize_by_box_size: true
